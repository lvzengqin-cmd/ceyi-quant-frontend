[build]
  command = "echo 'Frontend only - no build needed'"
  publish = "dist"

[build.environment]
  PYTHON_VERSION = ""
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "https://web-production-79218.up.railway.app/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"